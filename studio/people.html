<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>People — Tuttle Kids Studio</title>
<link rel="stylesheet" href="studio.css">
</head>
<body>
<div id="gate"></div>

<main id="app" class="wrap narrow" hidden>
  <div class="page-head">
    <h1>Cast &amp; crew</h1>
    <button class="btn-mini primary" id="addBtn">+ Add person</button>
  </div>
  <p class="small muted">The show's contact sheet — crew, voice actors, and the kid families once selected. Everything autosaves.</p>
  <div class="grid" id="list"><p class="empty-state">Loading…</p></div>
</main>

<script type="module">
import { db, escapeHtml, toast } from "./studio-store.js";
import { requireModerator } from "./studio-auth.js";

await requireModerator();

const list = document.getElementById("list");
let ROWS = [];

async function load() { ROWS = await db.contacts(); render(); }

function render() {
  if (!ROWS.length) {
    list.innerHTML = `<p class="empty-state">No one yet. Add the crew — Steve, Nelson, Jonny, Natalie, Blake… — and the families after July 17.</p>`;
    return;
  }
  list.innerHTML = ROWS.map(p => `
    <article class="card" data-id="${p.id}">
      <div class="row-split">
        <input class="input" data-f="name" value="${escapeHtml(p.name)}" style="font-weight:700; max-width:220px;">
        <div style="display:flex; gap:6px; align-items:center;">
          <input class="input" data-f="role" value="${escapeHtml(p.role)}" placeholder="Role" style="max-width:180px; font-size:0.85rem;">
          <button class="btn-mini danger" data-del>✕</button>
        </div>
      </div>
      <div class="row-split mt" style="gap:8px;">
        <input class="input" data-f="email" value="${escapeHtml(p.email)}" placeholder="Email" style="flex:1; min-width:180px; font-size:0.85rem;">
        <input class="input" data-f="phone" value="${escapeHtml(p.phone)}" placeholder="Phone" style="max-width:160px; font-size:0.85rem;">
        <input class="input" data-f="status" value="${escapeHtml(p.status)}" placeholder="Status (e.g. under contract)" style="max-width:220px; font-size:0.85rem;">
      </div>
      <textarea class="input mt" data-f="notes" rows="1" placeholder="Notes">${escapeHtml(p.notes)}</textarea>
    </article>`).join("");

  list.querySelectorAll("article").forEach(card => {
    const row = ROWS.find(r => r.id === card.dataset.id);
    card.querySelectorAll("[data-f]").forEach(el => {
      let t;
      el.addEventListener("input", () => {
        clearTimeout(t);
        t = setTimeout(async () => {
          try { await db.saveContact(row.id, { [el.dataset.f]: el.value }); }
          catch (e) { toast(e.message, true); }
        }, 700);
      });
    });
    card.querySelector("[data-del]").addEventListener("click", async () => {
      if (!confirm(`Remove ${row.name}?`)) return;
      try { await db.deleteContact(row.id); load(); }
      catch (e) { toast(e.message, true); }
    });
  });
}

document.getElementById("addBtn").addEventListener("click", async () => {
  const name = prompt("Name?");
  if (!name) return;
  try { await db.addContact({ name }); load(); }
  catch (e) { toast(e.message, true); }
});

load();
</script>
</body>
</html>
