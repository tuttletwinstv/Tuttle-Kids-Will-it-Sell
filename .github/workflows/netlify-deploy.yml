name: Deploy to Netlify

# Auto-deploy the Tuttle Kids · Will It Sell site to Netlify on every
# push to main. The site is NOT connected to GitHub directly in
# Netlify's dashboard (it's using the legacy netlify-git provider), so
# this Action drives every production build via `netlify deploy`.
#
# Secrets needed in this repo's Settings → Secrets and variables → Actions:
#   - NETLIFY_AUTH_TOKEN  (Personal Access Token from
#       https://app.netlify.com/user/applications#personal-access-tokens)
# Site ID is not secret — hard-coded below.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    "3dd7382b-e8b2-4ff4-b306-4b497dca4000"
        run: |
          npx -y netlify-cli@latest deploy \
            --prod \
            --dir=. \
            --site="$NETLIFY_SITE_ID" \
            --auth="$NETLIFY_AUTH_TOKEN" \
            --message="GitHub Actions: ${{ github.sha }}"
