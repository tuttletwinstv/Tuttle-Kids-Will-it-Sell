<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moderator — Tuttle Twins Entrepreneur Series</title>
<link rel="stylesheet" href="../ds/styles.css">
<link rel="stylesheet" href="../site.css">
<style>
  /* Admin-only styles. Keeps the ds tokens but layouts as a wider
     dashboard than the public form. */
  body { background: var(--bg, #f5f4ee); }
  .admin-wrap { max-width: 1100px; margin: 0 auto; padding: 18px 16px 80px; }
  .admin-bar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap; margin-bottom: 18px;
    padding: 14px 16px; background: #fff;
    border: 1px solid rgba(0,0,0,0.08); border-radius: 14px;
  }
  .admin-bar h1 { margin: 0; font-size: 1.25rem; }
  .admin-bar .who { font-size: 0.85rem; color: var(--muted, #6b7280); }
  .admin-bar .who b { color: var(--ink, #0f172a); font-weight: 700; }
  .admin-actions { display: inline-flex; gap: 8px; flex-wrap: wrap; }

  /* Sign-in card */
  .signin {
    max-width: 460px; margin: 80px auto;
    padding: 28px 26px; background: #fff;
    border: 1px solid rgba(0,0,0,0.08); border-radius: 18px;
    text-align: center;
  }
  .signin h1 { margin: 0 0 6px; font-size: 1.6rem; }
  .signin p  { margin: 0 0 18px; color: var(--muted, #6b7280); font-size: 0.95rem; }
  .signin input { width: 100%; margin-bottom: 12px; }
  .signin .msg { margin-top: 12px; font-size: 0.9rem; min-height: 1.2em; }
  .signin .msg.ok    { color: #166534; font-weight: 700; }
  .signin .msg.error { color: #b91c1c; font-weight: 700; }

  /* Filters */
  .filters {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    margin-bottom: 14px;
  }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 999px;
    border: 1px solid rgba(0,0,0,0.15); background: #fff;
    font-size: 0.85rem; cursor: pointer; user-select: none;
    color: var(--ink, #0f172a);
  }
  .pill[aria-pressed="true"] { background: var(--ink, #0f172a); color: #fff; border-color: var(--ink, #0f172a); }
  .pill .count { font-weight: 700; opacity: 0.8; }
  .filters input[type="search"] {
    flex: 1 1 220px; min-width: 0;
    padding: 8px 12px; border-radius: 999px;
    border: 1px solid rgba(0,0,0,0.15); background: #fff;
    font: inherit;
  }

  /* Application cards */
  #appsList { display: grid; gap: 14px; }
  .app-card {
    background: #fff; border: 1px solid rgba(0,0,0,0.08);
    border-radius: 16px; padding: 16px 18px; overflow: hidden;
  }
  .app-card .row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; flex-wrap: wrap; margin-bottom: 8px;
  }
  .app-card h2 {
    margin: 0; font-size: 1.15rem; line-height: 1.2;
  }
  .app-card .meta {
    color: var(--muted, #6b7280);
    font-size: 0.85rem;
    margin-bottom: 12px;
  }
  .app-card .meta b { color: var(--ink, #0f172a); }
  .app-card .pitch {
    background: rgba(0,0,0,0.03); border-radius: 10px;
    padding: 10px 12px; font-size: 0.92rem; line-height: 1.5;
    white-space: pre-wrap; margin-bottom: 12px;
  }
  .videos {
    display: grid; gap: 10px;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    margin-bottom: 12px;
  }
  .video-slot {
    background: #000; border-radius: 10px; overflow: hidden; position: relative;
  }
  .video-slot video { width: 100%; aspect-ratio: 16/9; display: block; background: #000; }
  .video-slot .slot-label {
    position: absolute; top: 6px; left: 8px;
    background: rgba(0,0,0,0.65); color: #fff;
    font-size: 0.7rem; padding: 2px 8px; border-radius: 999px;
    letter-spacing: 0.05em; text-transform: uppercase;
    pointer-events: none;
  }
  .video-slot.missing {
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 0.85rem; aspect-ratio: 16/9;
  }

  /* Status pill colors */
  .status-pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 999px;
    font-size: 0.78rem; font-weight: 700; letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .status-pending  { background: #fef3c7; color: #92400e; }
  .status-reviewed { background: #e0e7ff; color: #3730a3; }
  .status-accepted { background: #dcfce7; color: #166534; }
  .status-rejected { background: #fee2e2; color: #991b1b; }

  /* Actions */
  .app-actions { display: flex; flex-wrap: wrap; gap: 6px; }
  .btn-mini {
    padding: 6px 12px; border-radius: 999px;
    border: 1px solid rgba(0,0,0,0.15); background: #fff;
    font-size: 0.82rem; font-weight: 600; cursor: pointer;
    color: var(--ink, #0f172a);
  }
  .btn-mini:hover { border-color: rgba(0,0,0,0.4); }
  .btn-mini.primary  { background: var(--ink, #0f172a); color: #fff; border-color: var(--ink, #0f172a); }
  .btn-mini.accept   { background: #166534; color: #fff; border-color: #166534; }
  .btn-mini.reject   { background: #991b1b; color: #fff; border-color: #991b1b; }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--muted, #6b7280);
  }
  .toast {
    position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%);
    background: #0f172a; color: #fff; padding: 10px 18px;
    border-radius: 999px; font-size: 0.9rem; opacity: 0;
    pointer-events: none; transition: opacity 0.2s;
    z-index: 100;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="admin-wrap">

  <!-- Sign-in screen (no session) -->
  <section class="signin" id="signin" hidden>
    <h1>Moderator sign-in</h1>
    <p>Enter your moderator email. We'll send a one-time sign-in link.</p>
    <input class="input" id="signinEmail" type="email" placeholder="you@tuttletwins.tv" autocomplete="email">
    <button class="btn btn-pop btn-lg btn-block" id="sendLinkBtn">Send sign-in link</button>
    <p class="msg" id="signinMsg" role="status" aria-live="polite"></p>
  </section>

  <!-- Dashboard (signed-in) -->
  <section id="dashboard" hidden>
    <header class="admin-bar">
      <div>
        <h1>Will It Sell · Applications</h1>
        <p class="who">Signed in as <b id="userEmail">…</b></p>
      </div>
      <div class="admin-actions">
        <button class="btn-mini" id="refreshBtn">↻ Refresh</button>
        <button class="btn-mini" id="exportCsvBtn">⬇ Export CSV</button>
        <button class="btn-mini" id="signoutBtn">Sign out</button>
      </div>
    </header>

    <div class="filters" id="statusFilters" role="tablist" aria-label="Filter by status">
      <button class="pill" data-status="all"      aria-pressed="true">All <span class="count" data-count="all">0</span></button>
      <button class="pill" data-status="pending"  aria-pressed="false">Pending <span class="count" data-count="pending">0</span></button>
      <button class="pill" data-status="reviewed" aria-pressed="false">Reviewed <span class="count" data-count="reviewed">0</span></button>
      <button class="pill" data-status="accepted" aria-pressed="false">Accepted <span class="count" data-count="accepted">0</span></button>
      <button class="pill" data-status="rejected" aria-pressed="false">Rejected <span class="count" data-count="rejected">0</span></button>
      <input id="searchInput" type="search" placeholder="Search name, city, email…" autocomplete="off">
    </div>

    <div id="appsList" aria-live="polite"></div>
    <div class="empty-state" id="emptyState" hidden>No applications match the current filters.</div>
  </section>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script type="module">
  // ============================================================
  // Moderator review page. Auth: Supabase magic link, restricted
  // by the public.moderators whitelist + RLS policies in
  // supabase-setup.sql. The page can run for either signed-in
  // moderators (full dashboard) or anyone else (sign-in screen
  // only — RLS would block any data fetch anyway).
  // ============================================================
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  // Reusing the same project URL + anon key as the public form.
  // We initialize a SEPARATE client here so the public form's
  // "no auth session" config doesn't conflict with the admin
  // session we want to persist across page loads.
  const SUPABASE_URL  = "https://ukeqcxdpzkhwlibabawg.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrZXFjeGRwemtod2xpYmFiYXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MjMwMjYsImV4cCI6MjA5ODA5OTAyNn0.-0a_9qz4ryHNBi6P6cXMTF02ceMwYmkuRtoT4uE-_v4";
  const STORAGE_BUCKET = "application-videos";

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON, {
    auth: {
      persistSession:    true,
      autoRefreshToken:  true,
      detectSessionInUrl: true,   // catch magic-link callbacks
    },
  });

  const signinEl    = document.getElementById("signin");
  const dashboardEl = document.getElementById("dashboard");
  const signinEmail = document.getElementById("signinEmail");
  const signinMsg   = document.getElementById("signinMsg");
  const userEmailEl = document.getElementById("userEmail");
  const appsListEl  = document.getElementById("appsList");
  const emptyState  = document.getElementById("emptyState");
  const searchInput = document.getElementById("searchInput");
  const toastEl     = document.getElementById("toast");

  let APPS  = [];           // full list from the server
  let STATE = { status: "all", search: "" };

  // ----------------------------------------------------------
  // Auth bootstrap — decide which view to render on page load.
  // ----------------------------------------------------------
  async function bootstrap() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session?.user?.email) {
      showDashboard(session.user.email);
      await loadApps();
    } else {
      showSignin();
    }
  }

  function showSignin() {
    signinEl.hidden    = false;
    dashboardEl.hidden = true;
  }

  function showDashboard(email) {
    signinEl.hidden    = true;
    dashboardEl.hidden = false;
    userEmailEl.textContent = email;
  }

  // ----------------------------------------------------------
  // Magic link sign-in. Supabase emails a one-time link that
  // brings the moderator back here with a session attached.
  // ----------------------------------------------------------
  document.getElementById("sendLinkBtn").addEventListener("click", async () => {
    const email = (signinEmail.value || "").trim().toLowerCase();
    if (!email) {
      signinMsg.textContent = "Type your email first.";
      signinMsg.className = "msg error";
      return;
    }
    signinMsg.textContent = "Sending…";
    signinMsg.className = "msg";
    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: {
        emailRedirectTo: window.location.origin + window.location.pathname,
        shouldCreateUser: true,
      },
    });
    if (error) {
      signinMsg.textContent = error.message || "Couldn't send the link.";
      signinMsg.className = "msg error";
      return;
    }
    signinMsg.textContent = "Check your email for a sign-in link.";
    signinMsg.className = "msg ok";
  });

  document.getElementById("signoutBtn").addEventListener("click", async () => {
    await supabase.auth.signOut();
    location.reload();
  });

  // ----------------------------------------------------------
  // Data load — RLS gates this; if the user isn't a moderator,
  // the query returns 0 rows and we tell them so.
  // ----------------------------------------------------------
  async function loadApps() {
    appsListEl.innerHTML = `<p class="empty-state">Loading…</p>`;
    const { data, error } = await supabase
      .from("applications")
      .select("*")
      .order("created_at", { ascending: false });
    if (error) {
      appsListEl.innerHTML = `<p class="empty-state">Couldn't load applications: ${escapeHtml(error.message)}</p>`;
      return;
    }
    APPS = data || [];

    if (APPS.length === 0) {
      appsListEl.innerHTML = `<p class="empty-state">No applications yet — or you aren't on the moderator whitelist.</p>`;
      return;
    }

    // Pre-fetch signed URLs in parallel so videos load instantly.
    await Promise.all(APPS.map(async (app) => {
      app._signed = await signedUrlsFor(app);
    }));

    render();
  }

  async function signedUrlsFor(app) {
    const paths = [
      ["pitch",  app.pitch_video_path],
      ["intro",  app.intro_video_path],
      ["parent", app.parent_video_path],
    ];
    const out = {};
    await Promise.all(paths.map(async ([slot, path]) => {
      if (!path) { out[slot] = null; return; }
      const { data, error } = await supabase
        .storage
        .from(STORAGE_BUCKET)
        .createSignedUrl(path, 3600);    // 1 hr
      out[slot] = error ? null : data?.signedUrl;
    }));
    return out;
  }

  // ----------------------------------------------------------
  // Filter + render
  // ----------------------------------------------------------
  function render() {
    const counts = { all: APPS.length, pending: 0, reviewed: 0, accepted: 0, rejected: 0 };
    APPS.forEach((a) => {
      if (counts[a.status] !== undefined) counts[a.status]++;
    });
    Object.entries(counts).forEach(([k, v]) => {
      const el = document.querySelector(`[data-count="${k}"]`);
      if (el) el.textContent = v;
    });

    const q = STATE.search.trim().toLowerCase();
    const filtered = APPS.filter((a) => {
      if (STATE.status !== "all" && a.status !== STATE.status) return false;
      if (!q) return true;
      const hay = [
        a.applicant_names, a.guardian_name, a.guardian_email,
        a.city, a.business_pitch,
      ].join(" ").toLowerCase();
      return hay.includes(q);
    });

    if (filtered.length === 0) {
      appsListEl.innerHTML = "";
      emptyState.hidden = false;
      return;
    }
    emptyState.hidden = true;
    appsListEl.innerHTML = filtered.map(renderCard).join("");
  }

  function renderCard(app) {
    const status = app.status || "pending";
    const sub = `${escapeHtml(app.applicant_ages || "")} · ${escapeHtml(app.city || "")}`;
    const submitted = formatDate(app.created_at);
    const videos = ["pitch","intro","parent"].map((slot) => {
      const url = app._signed?.[slot];
      const label = slot === "pitch" ? "Pitch" : slot === "intro" ? "Introduction" : "Parent / guardian";
      if (!url) {
        return `<div class="video-slot missing"><div class="slot-label">${label}</div>No video</div>`;
      }
      return `
        <div class="video-slot">
          <span class="slot-label">${label}</span>
          <video controls preload="metadata" src="${escapeAttr(url)}"></video>
        </div>`;
    }).join("");

    const unavail = Array.isArray(app.unavailable_dates) ? app.unavailable_dates : [];
    const unavailLine = unavail.length
      ? `<div class="meta"><b>Unavailable:</b> ${unavail.map(escapeHtml).join(", ")}</div>`
      : "";

    const market  = app.can_attend_market === "yes" ? "Yes" : (app.can_attend_market || "—");
    const weekly  = app.weekly_availability === "yes" ? "Fully available"
                : app.weekly_availability === "mostly" ? "Mostly available"
                : "—";

    const history = app.previous_market_history
      ? `<div class="pitch"><b>Market history:</b> ${escapeHtml(app.previous_market_history)}</div>`
      : "";

    return `
      <article class="app-card" data-id="${escapeAttr(app.id)}">
        <div class="row">
          <h2>${escapeHtml(app.applicant_names || "(no name)")}</h2>
          <span class="status-pill status-${escapeAttr(status)}">${escapeHtml(status)}</span>
        </div>
        <div class="meta">
          ${sub} ·
          Parent: <b>${escapeHtml(app.guardian_name || "")}</b>
          · <a href="mailto:${escapeAttr(app.guardian_email)}">${escapeHtml(app.guardian_email || "")}</a>
          · <a href="tel:${escapeAttr(app.guardian_phone)}">${escapeHtml(app.guardian_phone || "")}</a>
        </div>
        <div class="meta">
          <b>Market Aug 8:</b> ${market}
          · <b>Weekly visits:</b> ${weekly}
          · <b>Submitted:</b> ${submitted}
        </div>
        ${unavailLine}
        <div class="pitch">${escapeHtml(app.business_pitch || "")}</div>
        ${history}
        <div class="videos">${videos}</div>
        <div class="app-actions">
          <button class="btn-mini accept" data-action="accepted">Accept</button>
          <button class="btn-mini reject" data-action="rejected">Reject</button>
          <button class="btn-mini"        data-action="reviewed">Mark reviewed</button>
          <button class="btn-mini"        data-action="pending">Reset to pending</button>
        </div>
      </article>`;
  }

  // ----------------------------------------------------------
  // Status updates — one button per option. RLS enforces that
  // only whitelisted moderators can UPDATE.
  // ----------------------------------------------------------
  appsListEl.addEventListener("click", async (e) => {
    const btn = e.target.closest("button[data-action]");
    if (!btn) return;
    const card = btn.closest(".app-card");
    const id   = card?.dataset?.id;
    const next = btn.dataset.action;
    if (!id || !next) return;

    const original = btn.textContent;
    btn.disabled = true;
    btn.textContent = "Saving…";
    const { error } = await supabase
      .from("applications")
      .update({ status: next })
      .eq("id", id);
    btn.disabled = false;
    btn.textContent = original;
    if (error) {
      showToast(`Couldn't update: ${error.message}`);
      return;
    }
    const app = APPS.find((a) => a.id === id);
    if (app) app.status = next;
    render();
    showToast(`Marked ${next}`);
  });

  // ----------------------------------------------------------
  // Filter pills + search
  // ----------------------------------------------------------
  document.getElementById("statusFilters").addEventListener("click", (e) => {
    const pill = e.target.closest(".pill");
    if (!pill) return;
    STATE.status = pill.dataset.status;
    document.querySelectorAll(".pill").forEach((p) =>
      p.setAttribute("aria-pressed", p === pill ? "true" : "false")
    );
    render();
  });
  searchInput.addEventListener("input", () => {
    STATE.search = searchInput.value;
    render();
  });

  document.getElementById("refreshBtn").addEventListener("click", () => loadApps());

  // ----------------------------------------------------------
  // CSV export — every contactable application, regardless of
  // the currently active filter. The CSV includes status so a
  // spreadsheet user can filter from there.
  // ----------------------------------------------------------
  document.getElementById("exportCsvBtn").addEventListener("click", () => {
    if (!APPS.length) { showToast("Nothing to export."); return; }
    const cols = [
      "created_at","status",
      "applicant_names","applicant_ages","city",
      "guardian_name","guardian_email","guardian_phone",
      "can_attend_market","weekly_availability","unavailable_dates",
      "business_pitch","previous_market_history","signature",
    ];
    const rows = [cols.join(",")];
    APPS.forEach((a) => {
      const row = cols.map((c) => csvCell(a[c]));
      rows.push(row.join(","));
    });
    const blob = new Blob([rows.join("\n")], { type: "text/csv;charset=utf-8" });
    const url  = URL.createObjectURL(blob);
    const link = document.createElement("a");
    const stamp = new Date().toISOString().slice(0,10);
    link.href = url;
    link.download = `applications-${stamp}.csv`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  });

  // ----------------------------------------------------------
  // Helpers
  // ----------------------------------------------------------
  function csvCell(v) {
    if (v === null || v === undefined) return "";
    if (Array.isArray(v)) v = v.join("; ");
    const s = String(v);
    // Quote if there's a delimiter, quote, or newline.
    if (/[",\n]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
    return s;
  }
  function formatDate(iso) {
    if (!iso) return "";
    try {
      const d = new Date(iso);
      return d.toLocaleString(undefined, {
        year: "numeric", month: "short", day: "numeric",
        hour: "numeric", minute: "2-digit",
      });
    } catch { return iso; }
  }
  function escapeHtml(s) {
    return String(s ?? "").replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
    }[c]));
  }
  function escapeAttr(s) { return escapeHtml(s); }
  let toastTimer = null;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2400);
  }

  // Kick off
  bootstrap();
</script>
</body>
</html>
